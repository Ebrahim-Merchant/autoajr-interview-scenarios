<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scenario 3 — AI-Generated Code Review</title>
    <style>
      body { font-family: sans-serif; max-width: 640px; margin: 40px auto; padding: 0 16px; }
      .bell-area { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
      button { padding: 8px 14px; border: 1px solid #ccc; border-radius: 6px; background: #fff; cursor: pointer; font-size: 15px; }
      button:hover { background: #f5f5f5; }
      .badge { background: #ef4444; color: white; border-radius: 999px; padding: 2px 7px; font-size: 12px; }
      ul { list-style: none; padding: 0; border: 1px solid #ddd; border-radius: 8px; }
      li { padding: 10px 14px; border-bottom: 1px solid #eee; cursor: pointer; }
      li:last-child { border-bottom: none; }
      li.unread { font-weight: bold; background: #f0f7ff; }
      li.read { color: #888; }
      .hint { background: #fff3cd; border: 1px solid #ffc107; border-radius: 6px; padding: 10px 14px; margin-bottom: 16px; font-size: 14px; }
      .status { font-size: 13px; color: #555; margin-bottom: 12px; }
      h2 { color: #333; }
      .ai-badge { background: #e0e7ff; color: #4338ca; border-radius: 4px; padding: 2px 6px; font-size: 11px; font-weight: bold; margin-left: 8px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scenario 3 — AI-Generated Code Review</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0f0f13;
        color: #e2e8f0;
        min-height: 100vh;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 40px 16px;
      }
      #root { width: 100%; max-width: 520px; }

      h2 {
        font-size: 20px;
        font-weight: 700;
        color: #f1f5f9;
        margin-bottom: 4px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .ai-badge {
        background: #312e81;
        color: #a5b4fc;
        border-radius: 4px;
        padding: 2px 8px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.04em;
      }
      .subtitle {
        font-size: 13px;
        color: #64748b;
        margin-bottom: 20px;
      }

      .hint {
        background: #1e1b4b;
        border: 1px solid #3730a3;
        border-radius: 8px;
        padding: 12px 14px;
        margin-bottom: 20px;
        font-size: 13px;
        color: #a5b4fc;
        line-height: 1.6;
      }
      .hint small { color: #6366f1; display: block; margin-top: 4px; }

      .user-switcher {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 20px;
      }
      .user-switcher label { font-size: 13px; color: #94a3b8; }
      .user-switcher select {
        background: #1e293b;
        color: #e2e8f0;
        border: 1px solid #334155;
        border-radius: 6px;
        padding: 6px 10px;
        font-size: 13px;
        cursor: pointer;
        outline: none;
      }
      .user-switcher select:focus { border-color: #6366f1; }

      .notification-panel {
        background: #1a1a24;
        border: 1px solid #2d2d3d;
        border-radius: 12px;
        overflow: hidden;
      }
      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 18px;
        border-bottom: 1px solid #2d2d3d;
        background: #16161f;
      }
      .panel-header-left {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .panel-title { font-size: 15px; font-weight: 600; color: #f1f5f9; }
      .badge {
        background: #ef4444;
        color: white;
        border-radius: 999px;
        padding: 2px 7px;
        font-size: 11px;
        font-weight: 700;
      }
      .panel-count { font-size: 12px; color: #475569; }

      ul { list-style: none; }
      li {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 13px 18px;
        border-bottom: 1px solid #22222e;
        cursor: pointer;
        transition: background 0.15s;
        font-size: 14px;
      }
      li:last-child { border-bottom: none; }
      li:hover { background: #1f1f2e; }
      li.unread { color: #f1f5f9; }
      li.unread::before {
        content: '';
        width: 7px;
        height: 7px;
        min-width: 7px;
        border-radius: 50%;
        background: #6366f1;
        display: inline-block;
      }
      li.read { color: #475569; }
      li.read::before {
        content: '';
        width: 7px;
        height: 7px;
        min-width: 7px;
        border-radius: 50%;
        background: #2d2d3d;
        display: inline-block;
      }

      .loading { padding: 20px 18px; color: #475569; font-size: 14px; }
      .empty { padding: 20px 18px; color: #475569; font-size: 14px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
